name: Сборка релиза

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Собрать ZIP
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-release.ps1 -Version "${{ github.ref_name }}"

      - name: Опубликовать релиз
        uses: softprops/action-gh-release@v2
        with:
          name: "Русификатор ${{ github.ref_name }}"
          body_path: docs/РЕЛИЗ.md
          files: release/Minecraft-Legacy-Rus.zip
